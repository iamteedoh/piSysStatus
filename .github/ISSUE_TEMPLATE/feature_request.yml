name: Feature request
description: Suggest a piSysStatus improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What system-status or display task is difficult today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and affected component or display hardware.
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Note privileged-service, install-script, or hardware-access implications, if any.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other approaches or workarounds you considered.
