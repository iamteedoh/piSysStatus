name: Bug report
description: Report a reproducible piSysStatus problem
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not paste tokens, passwords,
        SSH keys, or private host details.

  - type: input
    id: version
    attributes:
      label: piSysStatus version
      description: Provide a release tag or commit SHA.
      placeholder: v0.1.0 or 0123456
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Status display (pi_status.py)
        - Install script (install.sh)
        - systemd service (pi-status.service)
        - CI or release automation
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Raspberry Pi model
      options:
        - Raspberry Pi 5
        - Raspberry Pi 4
        - Raspberry Pi 3
        - Raspberry Pi Zero 2 W
        - Raspberry Pi Zero W
        - Other or not hardware-specific
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant OS, Python version, display size (128x32 or 128x64), and I2C address. Redact private details.
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Observe ...
        3. Expected ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant redacted output
      description: Remove secrets and private infrastructure details before pasting.
      render: shell
